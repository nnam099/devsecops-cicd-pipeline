apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "taskapi.fullname" . }}
  labels:
    {{- include "taskapi.labels" . | nindent 4 }}
data:
  NODE_ENV: {{ .Values.config.nodeEnv | quote }}
  PORT: {{ .Values.config.port | quote }}
  JWT_EXPIRES_IN: {{ .Values.config.jwtExpiresIn | quote }}
  RATE_LIMIT_WINDOW_MS: {{ .Values.config.rateLimitWindowMs | quote }}
  RATE_LIMIT_MAX_REQUESTS: {{ .Values.config.rateLimitMaxRequests | quote }}
  AUTH_RATE_LIMIT_MAX: {{ .Values.config.authRateLimitMax | quote }}
  TRUST_PROXY_HOPS: {{ .Values.config.trustProxyHops | quote }}
  METRICS_ENABLED: {{ .Values.config.metricsEnabled | quote }}
  CORS_ALLOWED_ORIGINS: {{ .Values.config.corsAllowedOrigins | quote }}
