services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.130.1@sha256:9c247564e65ca19f97d891cca19a1a8d291ce631b890885b44e3503c5fdb3895
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:ro
    depends_on:
      app:
        condition: service_started
    ports:
      - "127.0.0.1:${OTEL_PROMETHEUS_PORT:-9464}:9464"
      - "127.0.0.1:${OTEL_HEALTH_PORT:-13133}:13133"
    profiles: ["observability"]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]

  prometheus:
    image: prom/prometheus:v3.5.0@sha256:63805ebb8d2b3920190daf1cb14a60871b16fd38bed42b857a3182bc621f4996
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - taskapi_prometheus_data:/prometheus
    depends_on: [otel-collector]
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    profiles: ["observability"]
    read_only: true
    tmpfs: [/tmp]
    security_opt: [no-new-privileges:true]

  grafana:
    image: grafana/grafana:12.1.0@sha256:6ac590e7cabc2fbe8d7b8fc1ce9c9f0582177b334e0df9c927ebd9670469440f
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-change_me_local_only}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - taskapi_grafana_data:/var/lib/grafana
    depends_on: [prometheus]
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    profiles: ["observability"]
    security_opt: [no-new-privileges:true]

volumes:
  taskapi_prometheus_data:
  taskapi_grafana_data:
