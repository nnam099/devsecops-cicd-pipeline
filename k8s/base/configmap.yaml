apiVersion: v1
kind: ConfigMap
metadata:
  name: taskapi-config
  namespace: taskapi-staging
data:
  NODE_ENV: production
  PORT: "3000"
  JWT_EXPIRES_IN: 15m
  RATE_LIMIT_WINDOW_MS: "60000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  AUTH_RATE_LIMIT_MAX: "10"
  TRUST_PROXY_HOPS: "1"
  METRICS_ENABLED: 'true'
  CORS_ALLOWED_ORIGINS: https://taskapi-staging.example.com
