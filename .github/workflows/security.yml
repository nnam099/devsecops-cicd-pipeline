name: Security scans

on:
  push:
    branches: [main, develop, "demo/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Semgrep security rules
        run: >
          docker run --rm
          -v "${{ github.workspace }}:/src"
          semgrep/semgrep@sha256:2b33f46ba66cf8cc2ad59ccfa7d22951fd00c632c38f1339e84ec8e6e641a942
          semgrep scan --config p/security-audit --config .semgrep.yml
          --error --sarif --output semgrep.sarif src

      - name: Upload Semgrep SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: semgrep.sarif

  dependency-scan:
    name: SCA (npm audit + Trivy fs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: npm audit report
        id: npm_audit
        continue-on-error: true
        run: npm audit --audit-level=high --json > npm-audit.json

      - name: Trivy filesystem scan
        id: trivy_fs
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SCA evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sca-evidence
          path: |
            npm-audit.json
            trivy-fs.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Trivy filesystem SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-fs.sarif

      - name: Enforce SCA gate
        if: always()
        env:
          NPM_AUDIT_OUTCOME: ${{ steps.npm_audit.outcome }}
          TRIVY_FS_OUTCOME: ${{ steps.trivy_fs.outcome }}
        run: test "$NPM_AUDIT_OUTCOME" = success && test "$TRIVY_FS_OUTCOME" = success

  iac-scan:
    name: IaC scan (Trivy config)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan Kubernetes configuration
        id: trivy_k8s
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: k8s
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-k8s.sarif
      - name: Scan Helm chart
        id: trivy_helm
        continue-on-error: true
        env:
          TRIVY_HELM_KUBE_VERSION: 1.31.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: config
          scan-ref: helm
          severity: HIGH,CRITICAL
          exit-code: '1'
          format: sarif
          output: trivy-helm.sarif

      - name: Upload IaC evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iac-evidence
          path: |
            trivy-k8s.sarif
            trivy-helm.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Kubernetes configuration SARIF
        if: always() && hashFiles('trivy-k8s.sarif') != ''
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-k8s.sarif

      - name: Upload Helm configuration SARIF
        if: always() && hashFiles('trivy-helm.sarif') != ''
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-helm.sarif

      - name: Enforce IaC gate
        if: always()
        env:
          TRIVY_K8S_OUTCOME: ${{ steps.trivy_k8s.outcome }}
          TRIVY_HELM_OUTCOME: ${{ steps.trivy_helm.outcome }}
        run: test "$TRIVY_K8S_OUTCOME" = success && test "$TRIVY_HELM_OUTCOME" = success

  container-scan:
    name: Container scan (Trivy image)
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, dependency-scan, iac-scan]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build local image
        run: docker build -t taskapi:${{ github.sha }} .

      - name: Trivy image scan
        id: trivy_image
        continue-on-error: true
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: taskapi:${{ github.sha }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '1'
          format: sarif
          output: trivy-image.sarif

      - name: Upload container-scan evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: container-scan-evidence
          path: trivy-image.sarif
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@02c5e83432fe5497fd85b873b6c9f16a8578e1d9 # v3
        with:
          sarif_file: trivy-image.sarif

      - name: Enforce container scan gate
        if: always()
        env:
          TRIVY_IMAGE_OUTCOME: ${{ steps.trivy_image.outcome }}
        run: test "$TRIVY_IMAGE_OUTCOME" = success
