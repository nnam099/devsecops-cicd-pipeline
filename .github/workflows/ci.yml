# =============================================================================
# Baseline CI: build, lint, tests, and manifest validation.
#
# Security scans remain in the separate Security workflow so build failures
# and security findings remain independently diagnosable.
# =============================================================================
name: CI (build & test)

on:
  push:
    branches: [main, develop, "demo/**"]
  pull_request:
    branches: [main, develop]

# Least privilege: this workflow only needs to read the repo and write
# check/PR status — no write access to contents, packages, or deployments.
permissions:
  contents: read

# Fail fast: cancel superseded runs on the same ref to save CI minutes
# and give faster feedback on force-pushes / rapid commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint + eslint-plugin-security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (reproducible, uses lockfile exactly)
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit tests (no DB required)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    name: Integration tests (real PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint
    # Ephemeral PostgreSQL service container, torn down automatically
    # at the end of the job — no persistent test infrastructure to
    # maintain, which matters for reproducibility across CI runs.
    services:
      postgres:
        image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
        env:
          POSTGRES_DB: taskapi
          POSTGRES_USER: taskapi_owner
          POSTGRES_PASSWORD: ci_test_only_owner_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskapi_owner -d taskapi"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: taskapi
      PGUSER: taskapi_app
      PGPASSWORD: ci_test_only_password
      # A throwaway secret scoped to this CI run only — never reused
      # across environments, never committed. Real staging/production
      # secrets are injected via GitHub Actions Secrets, not here.
      JWT_SECRET: ci_ephemeral_secret_do_not_reuse_${{ github.run_id }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Bootstrap least-privilege runtime role
        env:
          PGPASSWORD: ci_test_only_owner_password
          TASKAPI_APP_PASSWORD: ci_test_only_password
        run: >
          psql -h localhost -U taskapi_owner -d taskapi
          -v taskapi_app_password="$TASKAPI_APP_PASSWORD"
          -f infra/db/roles.sql

      - name: Run database migrations
        env:
          PGUSER: taskapi_owner
          PGPASSWORD: ci_test_only_owner_password
        run: npm run migrate

      - name: Run full test suite with coverage
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  readiness-outage-test:
    name: Readiness test (actual PostgreSQL outage)
    runs-on: ubuntu-latest
    needs: lint
    env:
      VERIFY_DATABASE_OUTAGE: 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify /readyz during a real database outage
        run: npm run test:readyz-outage

      - name: Upload readiness-outage evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: readiness-outage-evidence
          path: |
            readiness-outage-evidence.json
            readiness-outage-compose.log
          if-no-files-found: warn
          retention-days: 30

  manifest-validation:
    name: Validate Kubernetes and Helm manifests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4
        with:
          version: v1.31.0

      - name: Set up Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        with:
          version: v3.18.4

      - name: Lint and render Helm chart
        run: |
          helm lint helm/taskapi --set-string image.digest=sha256:1111111111111111111111111111111111111111111111111111111111111111
          helm template taskapi helm/taskapi \
            --namespace taskapi-staging \
            --set-string image.digest=sha256:1111111111111111111111111111111111111111111111111111111111111111 \
            > helm-rendered.yaml

      - name: Render Kustomize overlays
        run: |
          kubectl kustomize k8s/base > kustomize-base.yaml
          kubectl kustomize k8s/observability > kustomize-observability.yaml

      - name: Upload rendered manifests
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rendered-manifests
          path: |
            helm-rendered.yaml
            kustomize-base.yaml
            kustomize-observability.yaml
          retention-days: 30

  docker-build:
    name: Docker image build (no push yet)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests, readiness-outage-test, manifest-validation]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build image (local only, not pushed — container/SCA scanning added in a later phase)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: false
          tags: taskapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
