# =============================================================================
# Baseline CI: build + lint + test ONLY.
#
# WHY no security scanning in this workflow yet: we are deliberately
# following a phased approach (see project README / thesis methodology).
# A pipeline that mixes an unstable build with security gates makes it
# impossible to tell whether a red pipeline is a build problem or a
# security finding. This workflow proves the build is solid; Gitleaks,
# Semgrep, Trivy, Dependency-Check, Checkov, ZAP, Syft, and Cosign are
# added as separate, individually-documented workflows in a later phase.
# =============================================================================
name: CI (build & test)

on:
  push:
    branches: [main, develop, "demo/**"]
  pull_request:
    branches: [main, develop]

# Least privilege: this workflow only needs to read the repo and write
# check/PR status — no write access to contents, packages, or deployments.
permissions:
  contents: read

# Fail fast: cancel superseded runs on the same ref to save CI minutes
# and give faster feedback on force-pushes / rapid commits.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ESLint + eslint-plugin-security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies (reproducible, uses lockfile exactly)
        run: npm ci --no-audit --no-fund

      - name: Run ESLint
        run: npm run lint

  unit-tests:
    name: Unit tests (no DB required)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run unit tests
        run: npm run test:unit

  integration-tests:
    name: Integration tests (real PostgreSQL)
    runs-on: ubuntu-latest
    needs: lint
    # Ephemeral PostgreSQL service container, torn down automatically
    # at the end of the job — no persistent test infrastructure to
    # maintain, which matters for reproducibility across CI runs.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: taskapi
          POSTGRES_USER: taskapi_app
          POSTGRES_PASSWORD: ci_test_only_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskapi_app -d taskapi"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      NODE_ENV: test
      PGHOST: localhost
      PGPORT: 5432
      PGDATABASE: taskapi
      PGUSER: taskapi_app
      PGPASSWORD: ci_test_only_password
      # A throwaway secret scoped to this CI run only — never reused
      # across environments, never committed. Real staging/production
      # secrets are injected via GitHub Actions Secrets, not here.
      JWT_SECRET: ci_ephemeral_secret_do_not_reuse_${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Run database migrations
        run: npm run migrate

      - name: Run full test suite with coverage
        run: npm test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  docker-build:
    name: Docker image build (no push yet)
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local only, not pushed — container/SCA scanning added in a later phase)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: taskapi:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
