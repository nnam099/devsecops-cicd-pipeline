extensions:
  health_check:
    endpoint: 0.0.0.0:13133

receivers:
  prometheus:
    config:
      scrape_configs:
        - job_name: taskapi
          scrape_interval: 15s
          static_configs:
            - targets: [app:3000]

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 128
  batch: {}

exporters:
  prometheus:
    endpoint: 0.0.0.0:9464

service:
  extensions: [health_check]
  pipelines:
    metrics:
      receivers: [prometheus]
      processors: [memory_limiter, batch]
      exporters: [prometheus]
